<main class="page">
  <section class="apply-loan">
    <h1>Apply for Loan</h1>
    <p class="subtitle">Enter your loan details below.</p>

    <form class="application-form">
      <label class="field">
        <span>Loan Amount</span>
        <input
          type="number"
          [value]="amount()"
          (input)="onAmountInput($event)"
          (blur)="onAmountBlur()"
          [class.input-error]="showAmountError()"
          placeholder="e.g. 5000"
          min="2000"
          max="50000"
        />
        @if (showAmountError()) {
          <span class="field-error">Loans are only offered from $2,000-$50,000</span>
        }
      </label>

      <label class="field">
        <span>Term Length (months)</span>
        <select [value]="termLength()" (change)="onTermLengthChange($event)">
          <option value="" disabled>Select term length</option>
          @for (length of termLengths; track length) {
            <option [value]="length">{{ length }}</option>
          }
        </select>
      </label>

      <label class="field">
        <span>Payment Frequency</span>
        <select [value]="paymentFrequency()" (change)="onPaymentFrequencyChange($event)">
          <option value="" disabled>Select frequency</option>
          @for (frequency of paymentFrequencies; track frequency) {
            <option [value]="frequency">{{ frequency }}</option>
          }
        </select>
      </label>
    </form>

    <div class="actions">
      <button type="button" class="btn btn-primary" [disabled]="!canSubmit()" (click)="submit()">
        Submit Loan
      </button>
      <a routerLink="/dashboard" class="btn btn-secondary">Back to Dashboard</a>
    </div>
  </section>
</main>
